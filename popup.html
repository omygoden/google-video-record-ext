<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>AV Recorder Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="container">
    <h1>AV Recorder Pro</h1>
    <p class="subtitle">录制当前标签页视频和声音（MP4 / MP3 / WAV）</p>

    <section class="card">
      <h2>视频录制（当前标签页）</h2>
      <label class="option">
        <input id="videoWithAudio" type="checkbox" checked>
        包含标签页播放声音
      </label>
      <p id="videoTimer" class="timer">录制时长：00:00</p>
      <div class="actions">
        <button id="startVideoBtn">开始视频录制</button>
        <button id="stopVideoBtn" class="danger" disabled>停止并保存 MP4</button>
      </div>
    </section>

    <section class="card">
      <h2>音频录制（当前标签页声音）</h2>
      <div class="inline">
        <label for="audioFormat">导出格式：</label>
        <select id="audioFormat">
          <option value="wav" selected>WAV</option>
          <option value="mp3">MP3</option>
        </select>
      </div>
      <p class="hint">已内置 2 倍音量增益，避免导出音量过小。</p>
      <p id="audioTimer" class="timer">录制时长：00:00</p>
      <div class="actions">
        <button id="startAudioBtn">开始音频录制</button>
        <button id="stopAudioBtn" class="danger" disabled>停止并保存</button>
      </div>
    </section>

    <p id="status" class="status">准备就绪</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
